<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Creavix IT Solution — AI-Powered Video Production & Digital Marketing Agency</title>
    <meta name="title" content="Creavix IT Solution — AI-Powered Video Production & Digital Marketing Agency" />
    <meta name="description" content="Bangladesh's #1 AI-powered digital marketing & premium video production agency. 3700+ projects delivered globally. Storytelling ads, product videos, travel campaigns & more." />
    <meta name="keywords" content="Creavix IT Solution, video production Bangladesh, digital marketing agency, AI marketing, storytelling ads, product video ads" />
    <meta name="author" content="Creavix IT Solution" />
    <meta name="theme-color" content="#060b18" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Creavix IT Solution" />
    <meta property="og:title" content="Creavix IT Solution — AI-Powered Video Production Agency" />
    <meta property="og:description" content="Bangladesh's premier AI-powered digital marketing & premium video production agency. 3700+ global projects, 2100+ satisfied clients. Transform your brand today." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Creavix IT Solution Logo" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="bn_BD" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@creavixit" />
    <meta name="twitter:creator" content="@creavixit" />
    <meta name="twitter:title" content="Creavix IT Solution — AI-Powered Video Production Agency" />
    <meta name="twitter:description" content="Bangladesh's premier AI-powered digital marketing & premium video production agency. 3700+ global projects." />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="Creavix IT Solution" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Dynamic absolute OG URL for social sharing -->
    <script>
      (function() {
        var base = window.location.origin;
        var metas = document.querySelectorAll('meta[property="og:image"], meta[name="twitter:image"]');
        for (var i = 0; i < metas.length; i++) {
          var content = metas[i].getAttribute('content');
          if (content && content.startsWith('/')) {
            metas[i].setAttribute('content', base + content);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
